<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>kuma-bart demo</title>
    <style>
      body {
        font-family: monospace;
        max-width: 900px;
        margin: 2rem auto;
        padding: 0 1rem;
      }
      button {
        font-size: 1rem;
        padding: 0.5rem 1rem;
      }
      input[type="text"] {
        font-family: monospace;
        font-size: 1rem;
        padding: 0.4rem;
        width: 26rem;
      }
      input[type="range"] {
        width: 24rem;
        vertical-align: middle;
      }
      .controls {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        margin: 0.5rem 0;
      }
      #tValue {
        display: inline-block;
        width: 4rem;
      }
      #frameStatus {
        font-size: 0.9rem;
        color: #555;
        min-height: 1.2em;
      }
      pre {
        background: #111;
        color: #0f0;
        padding: 1rem;
        overflow-x: auto;
        white-space: pre-wrap;
      }
      canvas {
        border: 1px solid #444;
        max-width: 100%;
        background: repeating-conic-gradient(#ccc 0% 25%, #fff 0% 50%) 50% / 20px 20px;
      }
    </style>
  </head>
  <body>
    <h1>kuma-bart</h1>
    <p>BAd RunTime for Kuma — loads a <code>.iph</code> package and runs it via WebGPU.</p>
    <p>Requires a WebGPU-capable browser (Chrome/Edge 113+).</p>
    <p>
      <label for="path">.iph path: </label>
      <input id="path" type="text" value="/artifacts/3mbunny.iph" />
      <button id="load">Load</button>
      <button id="verify" disabled>Verify against golden.json</button>
      <button id="profile" disabled>Profile one frame</button>
    </p>
    <div class="controls">
      <label for="t">t:</label>
      <input id="t" type="range" min="0" max="1" step="0.001" value="0.5" disabled />
      <span id="tValue">0.500</span>
      <button id="play" disabled>Play</button>
    </div>
    <div id="frameStatus"></div>
    <pre id="log">(idle)</pre>
    <canvas id="frame"></canvas>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
